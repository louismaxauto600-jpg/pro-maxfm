  <style>
    :root {
      --orange: #ff7300;
      --orange-light: #ff9b22;
      --black: #000;
      --dark: #111;
      --text: #ffd2a3;
      --muted: #c88952;
      --border: rgba(255, 115, 0, 0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--black)!important; color: var(--text)!important; line-height: 1.6; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; }

  .topbar { position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.96); border-bottom: 2px solid var(--orange); backdrop-filter: blur(18px); }
  .topbar-inner { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 16px; padding: 12px 20px; max-width: 1400px; margin: 0 auto; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--orange); background: var(--orange); display: grid; place-items: center; font-weight: 900; color: #000; font-size: 1.3rem; }
  .brand-text h1 { font-size: 18px; text-transform: uppercase; line-height: 1; margin: 0; color: var(--orange); }
  .brand-text p { font-size: 11px; margin-top: 4px; letter-spacing:.8px; color: var(--muted); }
  .main-nav { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .nav-btn { padding: 8px 12px; border: 1px solid var(--orange); border-radius: 999px; font-weight: 700; font-size: 0.8rem; background: #000; color: var(--orange); transition:.25s; }
  .nav-btn:hover { background: var(--orange); color: #000; }
  .lang-toggle { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--orange); background: #000; color: var(--orange); display: grid; place-items: center; font-size: 1.3rem; transition:.25s; cursor: pointer; }
  .lang-toggle:hover { background: var(--orange); color: #000; transform: rotate(15deg); }
  .admin-toggle { padding: 10px 18px; border: 1px solid var(--orange); border-radius: 999px; font-weight: 900; background: var(--orange); color: #000; }

  .hero { min-height: 85vh; display: grid; place-items: center; padding: 100px 20px; text-align: center; background: radial-gradient(circle at center, rgba(255, 115, 0, 0.26), transparent 56%); }
  .hero h1 { font-size: clamp(2.5rem, 7vw, 5rem); line-height: 1; text-transform: uppercase; margin-bottom: 20px; }
  .hero h1 span { display: block; color: var(--text); }
  .hero h1 strong { display: block; color: var(--orange); text-shadow: 0 0 36px rgba(255, 115, 0, 0.38); }
  .hero p { max-width: 700px; margin: 20px auto; color: var(--muted); font-size: 1.1rem; }
  .hero-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
  .btn { min-width: 180px; padding: 14px 22px; border: 1px solid var(--orange); border-radius: 999px; text-align: center; font-weight: 900; transition:.25s; }
  .btn:hover { transform: translateY(-4px); }
  .btn-primary { color: #000; background: linear-gradient(135deg, var(--orange-light), var(--orange)); }
  .btn-secondary { color: var(--orange-light); background: rgba(0, 0, 0, 0.5); }

  .modules-section { padding: 60px 20px; max-width: 1400px; margin: 0 auto; }
  .section-title { text-align: center; margin-bottom: 40px; }
  .section-title small { display: block; margin-bottom: 10px; color: var(--orange); font-weight: 900; letter-spacing: 1.7px; text-transform: uppercase; }
  .section-title h2 { font-size: clamp(2rem, 5vw, 3rem); color: var(--orange); margin: 0 0 10px 0; text-transform: uppercase; }
  .section-title p { color: var(--muted); }

  .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .module-card { min-height: 220px; display: flex; flex-direction: column; padding: 24px; border: 1px solid var(--border); border-radius: 18px; color: var(--orange); background: linear-gradient(145deg, rgba(255, 115, 0, 0.12), transparent 45%), var(--dark); box-shadow: 0 0 20px rgba(255, 106, 0, 0.14); cursor: pointer; transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease; }
  .module-card:hover { transform: translateY(-7px); border-color: var(--orange); box-shadow: 0 0 28px rgba(255, 106, 0, 0.34); }
  .module-icon { width: 56px; height: 56px; display: grid; place-items: center; margin-bottom: 18px; border-radius: 15px; color: #000; background: var(--orange); font-size: 1.55rem; }
  .module-card h3 { margin: 0; color: var(--orange); font-size: 1.08rem; text-transform: uppercase; }
  .module-card p { margin: 11px 0 0; color: var(--muted); font-size: 0.92rem; line-height: 1.6; }
  .module-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: auto; padding-top: 18px; }
  .module-link { color: var(--orange); font-size: 0.87rem; font-weight: 900; }
  .status { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border: 1px solid var(--border); border-radius: 999px; color: var(--orange); background: #000; font-size: 0.68rem; font-weight: 900; text-transform: uppercase; }
  .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 8px var(--orange); }

  .social-section { scroll-margin-top: 110px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #080808; padding: 60px 20px; }
  .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px; max-width: 1200px; margin: 0 auto; }
  .social-card { min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; border: 1px solid var(--border); border-radius: 20px; text-align: center; color: var(--orange); background: linear-gradient(145deg, rgba(255, 106, 0, 0.15), transparent 48%), var(--dark); cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
  .social-card:hover { transform: translateY(-7px); box-shadow: 0 0 30px rgba(255, 106, 0, 0.35); }
  .social-icon { margin-bottom: 16px; font-size: 2.5rem; }
  .social-card h3 { margin: 0; color: var(--orange); font-size: 1.1rem; text-transform: uppercase; }
  .social-card p { margin-top: 8px; color: var(--muted); font-size: 0.85rem; }

  .video-embed { margin-top: 50px; max-width: 900px; margin-left: auto; margin-right: auto; }
  .video-embed h3 { color: var(--orange); text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
  .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 2px solid var(--border); box-shadow: 0 15px 40px rgba(255, 115, 0, 0.3); }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .live-player { position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: 500px; background: rgba(0, 0, 0, 0.95); border: 2px solid var(--orange); border-radius: 20px; padding: 18px; z-index: 999; backdrop-filter: blur(20px); box-shadow: 0 10px 40px rgba(255, 115, 0, 0.4); }
  .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .live-indicator { display: flex; align-items: center; gap: 8px; color: #ff0000; font-weight: 900; font-size: 0.9rem; }
  .live-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .player-controls { display: flex; gap: 10px; align-items: center; }
  .play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--orange); color: #000; font-size: 1.5rem; display: grid; place-items: center; }

    footer { margin-top: 60px; padding: 30px 20px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); }

    @media (max-width: 1050px) {.modules-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 650px) {.modules-grid,.social-grid { grid-template-columns: 1fr; }.modules-section { padding: 56px 0; }.topbar-inner { grid-template-columns: 1fr; } }
  </style>
</head>

    function getOrCreateSection(sectionId, className) {
      let section = document.getElementById(sectionId);
      if (section) return section;
      section = document.createElement("section");
      section.id = sectionId;
      section.className = className;
      const main = document.querySelector("main") || document.getElementById("main-content");
      if (main) main.appendChild(section);
      else document.body.appendChild(section);
      return section;
    }

    function createModuleCard(module) {
      const card = document.createElement("article");
      card.className = "module-card";
      card.tabIndex = 0;
      card.innerHTML = `
        <div class="module-icon">${module.icon}</div>
        <h3>${module.name}</h3>
        <p>${module.desc}</p>
        <div class="module-footer">
          <span class="module-link" data-translate="open-module">Louvri modil la →</span>
          <span class="status">${module.status}</span>
        </div>
      `;
      card.addEventListener("click", () => openModule(module.id));
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openModule(module.id);
        }
      });
      return card;
    }

    function renderModules() {

          <h2 data-translate="modules-title">Modil PRO-MAX FM/DMP</h2>

        </div>
        <div class="modules-grid" id="modules-grid"></div>
      `;
      const grid = section.querySelector("#modules-grid");
      modules.forEach(module => grid.appendChild(createModuleCard(module)));
    }

    function openModule(id) {
      if (id === "social") {
        const socialSection = document.getElementById("social-streaming");

    }

    function scrollToSection(id) {
      const section = document.getElementById(id) || document.getElementById("pro-max-modules");
      if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    let isPlaying = false;
    function playLive() {
      isPlaying =!isPlaying;
      const playBtn = document.getElementById("playBtn");
      if (playBtn) playBtn.textContent = isPlaying? "⏸" : "▶";
      if (isPlaying) {
        const nowPlaying = document.getElementById("nowPlaying");
        if (nowPlaying) nowPlaying.textContent = "Mizik Kreyòl Mix - LIVE";
      }
    }

    function updateCurrentYear() {
      const yearElements = [document.getElementById("currentYear"), document.getElementById("year")];
      yearElements.forEach(el => { if (el) el.textContent = new Date().getFullYear(); });
    }

    function toggleLanguage() {
      currentLang = currentLang === 'kr'? 'fr' : 'kr';
      document.querySelectorAll('[data-translate]').forEach(el => {
        const key = el.getAttribute('data-translate');
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
      document.getElementById('langToggle').textContent = currentLang === 'kr'? '🌍' : '🌐';
    }

    function initializeProMaxPlatform() {
      renderModules();
      renderSocialModules();
      updateCurrentYear();
      const playBtn = document.getElementById("playBtn");
      if (playBtn) playBtn.addEventListener("click", playLive);
      const langToggle = document.getElementById("langToggle");
      if (langToggle) langToggle.addEventListener("click", toggleLanguage);
      console.log('✅ PRO-MAX FM DMP loaded with', modules.length, 'modules +', socialModules.length, 'social platforms');
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeProMaxPlatform);
    } else {
      initializeProMaxPlatform();
    }
  </script>

</body>
</html>
