<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PRO-MAX FM/DMP | Digital Radio Platform</title>

  <meta
    name="description"
    content="PRO-MAX FM/DMP se yon platfòm radyo dijital, medya, mizik, nouvèl, podcast, akademi ak jesyon pwofesyonèl."
  >

  <style>
    :root {
      --orange: #ff6a00 !important;
      --orange-light: #ff9d00 !important;
      --orange-dark: #b83b00 !important;
      --black: #000000 !important;
      --black-soft: #090909 !important;
      --black-card: #111111 !important;
      --border: rgba(255, 106, 0, 0.42) !important;
      --shadow: 0 0 30px rgba(255, 106, 0, 0.22) !important;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--orange-light) !important;
      background:
        radial-gradient(circle at top, rgba(255, 106, 0, 0.22), transparent 35%),
        linear-gradient(145deg, #000000 0%, #100500 48%, #000000 100%) !important;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .top-bar {
      background: linear-gradient(90deg, #000000, #8f2e00, #ff6a00, #000000) !important;
      color: #000000 !important;
      padding: 9px 20px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 5%;
      background: rgba(0, 0, 0, 0.95) !important;
      border-bottom: 1px solid var(--border) !important;
      backdrop-filter: blur(15px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 230px;
    }

    .brand-logo {
      width: 62px;
      height: 62px;
      object-fit: contain;
      border-radius: 50%;
      background: #000000 !important;
      border: 2px solid var(--orange) !important;
      box-shadow: 0 0 18px rgba(255, 106, 0, 0.6) !important;
    }

    .brand-text strong {
      display: block;
      color: var(--orange) !important;
      font-size: 1.15rem;
      letter-spacing: 1px;
    }

    .brand-text span {
      color: var(--orange-light) !important;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .main-nav a {
      padding: 9px 11px;
      border-radius: 8px;
      color: var(--orange-light) !important;
      font-size: 0.83rem;
      font-weight: 800;
      transition: 0.25s ease;
    }

    .main-nav a:hover {
      color: #000000 !important;
      background: var(--orange) !important;
      transform: translateY(-2px);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: #000 !important;
      border: 1px solid var(--orange) !important;
      border-radius: 10px;
      padding: 4px;
    }

    .lang-btn {
      padding: 7px 10px;
      border: none;
      background: transparent !important;
      color: var(--orange-light) !important;
      font-weight: 900;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 7px;
      transition: 0.2s;
    }

    .lang-btn.active {
      background: var(--orange) !important;
      color: #000 !important;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 43px;
      padding: 11px 17px;
      border: 1px solid var(--orange) !important;
      border-radius: 10px;
      font-weight: 900;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .btn-primary {
      color: #000000 !important;
      background: linear-gradient(135deg, var(--orange-light), var(--orange)) !important;
      box-shadow: 0 0 20px rgba(255, 106, 0, 0.35) !important;
    }

    .btn-secondary {
      color: var(--orange) !important;
      background: #000000 !important;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 27px rgba(255, 106, 0, 0.55) !important;
    }

    .menu-button {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--orange) !important;
      border-radius: 9px;
      color: var(--orange) !important;
      background: #000000 !important;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 84vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 50px;
      padding: 85px 7%;
      overflow: hidden;
      z-index: 1;
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border: 1px solid var(--orange) !important;
      border-radius: 30px;
      color: var(--orange) !important;
      background: rgba(0, 0, 0, 0.72) !important;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 800px;
      color: var(--orange) !important;
      font-size: clamp(2.7rem, 6vw, 6rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255, 106, 0, 0.42) !important;
    }

    .hero h1 span {
      display: block;
      color: var(--orange-light) !important;
      font-size: 0.45em;
      margin-top: 17px;
      line-height: 1.15;
    }

    .hero p {
      max-width: 720px;
      margin-top: 25px;
      color: #ffb15a !important;
      font-size: 1.07rem;
      line-height: 1.8;
    }

    .hero-buttons {
      display: flex;
      gap: 13px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .hero-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GLOBE TERES REYEL AK KONTINAN - PA JANM BLINK */
    .globe {
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      background: 
        radial-gradient(circle at 30% 30%, #3b82f6 0%, #1e40af 20%, #1e3a8a 40%, #0f172a 70%, #000 100%);
      border: 3px solid rgba(255, 106, 0.6) !important;
      box-shadow: 
        inset -60px -30px 100px rgba(0, 0, 0, 0.9),
        inset 30px 20px 60px rgba(59, 130, 246, 0.4),
        0 0 80px rgba(255, 106, 0, 0.5) !important;
      overflow: hidden;
      z-index: 1;
    }

    .globe::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        /* Afrik */
        radial-gradient(ellipse 80px 120px at 52% 45%, #22c55e 0%, transparent 70%),
        /* Ewòp */
        radial-gradient(ellipse 40px 50px at 50% 30%, #16a34a 0%, transparent 70%),
        /* Azi */
        radial-gradient(ellipse 140px 100px at 70% 35%, #22c55e 0%, transparent 70%),
        /* Amerik di Nò */
        radial-gradient(ellipse 90px 110px at 25% 35%, #16a34a 0%, transparent 70%),
        /* Amerik di Sid */
        radial-gradient(ellipse 50px 100px at 32% 65%, #22c55e 0%, transparent 70%),
        /* Ostrali */
        radial-gradient(ellipse 40px 30px at 80% 70%, #16a34a 0%, transparent 70%);
      border-radius: 50%;
      animation: spinGlobe 80s linear infinite;
    }

    .globe::after {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(0deg, transparent 19px, rgba(255, 255, 0.05) 19px, rgba(255, 255, 0.05) 20px),
        repeating-linear-gradient(90deg, transparent 19px, rgba(255, 255, 255, 0.05) 19px, rgba(255, 255, 255, 0.05) 20px);
      border-radius: 50%;
    }

    @keyframes spinGlobe {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hero-logo {
      position: relative;
      z-index: 2;
      width: min(470px, 88vw);
      filter: drop-shadow(0 0 35px rgba(255, 106, 0, 0.65)) !important;
    }

    .live-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 18px 5%;
      background: linear-gradient(90deg, #000000, #5d1c00, #000000) !important;
      border-top: 1px solid var(--border) !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .live-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--orange) !important;
      box-shadow: 0 0 12px var(--orange) !important;
    }

    .live-strip strong {
      color: var(--orange) !important;
      letter-spacing: 1px;
    }

    .section {
      padding: 80px 6%;
      position: relative;
      z-index: 10;
      background: #000000 !important;
    }

    .section-heading {
      max-width: 820px;
      margin: 0 auto 42px;
      text-align: center;
    }

    .section-heading small {
      display: block;
      margin-bottom: 10px;
      color: var(--orange) !important;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section-heading h2 {
      color: var(--orange-light) !important;
      font-size: clamp(2rem, 4vw, 3.4rem);
      text-transform: uppercase;
    }

    .section-heading p {
      margin-top: 14px;
      color: #db7f37 !important;
      line-height: 1.7;
    }

    /* MODIL YO - KORIGE Z-INDEX */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      position: relative;
      z-index: 20;
    }

    .service-card {
      position: relative;
      min-height: 225px;
      padding: 26px;
      border: 1px solid var(--border) !important;
      border-radius: 18px;
      background:

      box-shadow: var(--shadow) !important;
      overflow: hidden;
      transition: 0.3s ease;
    }

    .service-card::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      right: -45px;
      bottom: -45px;
      border-radius: 50%;
      background: var(--orange) !important;
      opacity: 0.13;
    }

    .service-card:hover {
      transform: translateY(-8px);
      border-color: var(--orange) !important;
      box-shadow: 0 0 32px rgba(255, 106, 0, 0.35) !important;
    }

    .service-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 55px;
      height: 55px;
      margin-bottom: 20px;
      border-radius: 15px;
      color: #000000 !important;
      background: var(--orange) !important;
      font-size: 1.7rem;
      font-weight: 900;
    }

    .service-card h3 {
      margin-bottom: 12px;
      color: var(--orange) !important;
      font-size: 1.17rem;
      text-transform: uppercase;
    }

    .service-card p {
      color: #d87731 !important;
      font-size: 0.91rem;
      line-height: 1.65;
    }

    .service-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--orange-light) !important;
      font-size: 0.88rem;
      font-weight: 900;
    }

    .platform-section {
      background:

        #050505 !important;
      border-top: 1px solid var(--border) !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .platform-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 40px;
      align-items: center;
    }

    .platform-image {
      padding: 28px;
      border: 1px solid var(--border) !important;
      border-radius: 25px;
      background: linear-gradient(140deg, #000000, #1c0800) !important;
      box-shadow: var(--shadow) !important;
    }

    .platform-image img {
      width: 100%;
      max-height: 500px;
      object-fit: contain;
      filter: drop-shadow(0 0 25px rgba(255, 106, 0, 0.4)) !important;
    }

    .platform-content h2 {
      color: var(--orange) !important;
      font-size: clamp(2rem, 4vw, 3.5rem);
      text-transform: uppercase;
    }

    .platform-content p {
      margin-top: 18px;
      color: #dd8138 !important;
      line-height: 1.8;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
    }

    .feature-item {
      padding: 15px;
      border-left: 4px solid var(--orange) !important;
      border-radius: 9px;
      color: var(--orange-light) !important;
      background: #0d0d0d !important;
      font-weight: 800;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 15px;
      margin-top: 42px;
    }

    .stat-card {
      padding: 25px 15px;
      border: 1px solid var(--border) !important;
      border-radius: 15px;
      text-align: center;
      background: #090909 !important;
    }

    .stat-card strong {
      display: block;
      color: var(--orange) !important;
      font-size: 2rem;
    }

    .stat-card span {
      display: block;
      margin-top: 6px;
      color: #cf7432 !important;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cta {
      margin: 30px 6% 75px;
      padding: 55px 7%;
      border: 1px solid var(--orange) !important;
      border-radius: 28px;
      text-align: center;
      background:

    .cta h2 {

    }

    .cta p {

      margin: 17px auto 25px;
      color: var(--orange-light) !important;
      line-height: 1.7;
    }

    .site-footer {
      padding: 50px 6% 25px;
      border-top: 1px solid var(--border) !important;
      background: #000000 !important;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.3fr repeat(3, 1fr);
      gap: 35px;
    }

    .footer-brand img {
      width: 95px;
      margin-bottom: 17px;
    }

    .footer-brand h3 {
      color: var(--orange) !important;
    }

    .footer-brand p {
      max-width: 350px;
      margin-top: 11px;
      color: #b95e24 !important;

    }

    .footer-column h4 {
      margin-bottom: 16px;
      color: var(--orange) !important;

    }

    .footer-column a {
      display: block;
      margin-bottom: 10px;

      font-size: 0.91rem;
    }

    .footer-column a:hover {
      color: var(--orange-light) !important;
    }

      margin-top: 35px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 106, 0, 0.22) !important;
      color: #a44e
