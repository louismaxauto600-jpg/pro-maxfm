<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRO-MAX FM/DMP | Digital Radio Platform</title>

  <style>
    :root {
      --orange: #ff6a00;
      --orange-light: #ff9d00;
      --black: #000000;
      --border: rgba(255, 106, 0, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #ff9d00;
      background: #000000;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .top-bar {
      background: linear-gradient(90deg, #000000, #8f2e00, #ff6a00, #000000);
      color: #000000;
      padding: 9px 20px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 5%;
      background: #000000;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 230px;
    }

    .brand-logo {
      width: 62px;
      height: 62px;
      object-fit: contain;
      border-radius: 50%;
      background: #000000;
      border: 2px solid var(--orange);
    }

    .brand-text strong {
      display: block;
      color: var(--orange);
      font-size: 1.15rem;
      letter-spacing: 1px;
    }

    .brand-text span {
      color: var(--orange-light);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .main-nav a {
      padding: 9px 11px;
      border-radius: 8px;
      color: var(--orange-light);
      font-size: 0.83rem;
      font-weight: 800;
    }

    .main-nav a:hover {
      color: #000000;
      background: var(--orange);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: #000;
      border: 1px solid var(--orange);
      border-radius: 10px;
      padding: 4px;
    }

    .lang-btn {
      padding: 7px 10px;
      border: none;
      background: transparent;
      color: var(--orange-light);
      font-weight: 900;
      font-size: 0.75rem;
      cursor: pointer;
      border-radius: 7px;
    }

    .lang-btn.active {
      background: var(--orange);
      color: #000;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 43px;
      padding: 11px 17px;
      border: 1px solid var(--orange);
      border-radius: 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-primary {
      color: #000000;
      background: var(--orange);
    }

    .btn-secondary {
      color: var(--orange);
      background: #000000;
    }

    .menu-button {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--orange);
      border-radius: 9px;
      color: var(--orange);
      background: #000000;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 84vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 50px;
      padding: 85px 7%;
      background: #000000;
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border: 1px solid var(--orange);
      border-radius: 30px;
      color: var(--orange);
      background: #000000;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 800px;
      color: var(--orange);
      font-size: clamp(2.7rem, 6vw, 6rem);
      line-height: 0.95;
      text-transform: uppercase;
    }

    .hero h1 span {
      display: block;
      color: var(--orange-light);
      font-size: 0.45em;
      margin-top: 17px;
      line-height: 1.15;
    }

    .hero p {
      max-width: 720px;
      margin-top: 25px;
      color: #ffb15a;
      font-size: 1.07rem;
      line-height: 1.8;
    }

    .hero-buttons {
      display: flex;
      gap: 13px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .hero-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GLOBE KI MACHE - CSS SÈLMAN, PA GEN IMAJ EKSTÈN */
    .globe {
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      background: #1e40af;
      border: 3px solid rgba(255, 106, 0, 0.6);
      box-shadow: 
        inset -60px -30px 100px rgba(0, 0, 0, 0.9),
        0 0 80px rgba(255, 106, 0, 0.4);
      z-index: 1;
      overflow: hidden;
    }

    .globe::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 100px 140px at 30% 30%, #22c55e 0%, transparent 70%),
        radial-gradient(ellipse 120px 90px at 70% 25%, #16a34a 0%, transparent 70%),
        radial-gradient(ellipse 110px 170px at 25% 70%, #22c55e 0%, transparent 70%),
        radial-gradient(ellipse 150px 100px at 75% 75%, #16a34a 0%, transparent 70%),
        radial-gradient(ellipse 80px 60px at 50% 50%, #22c55e 0%, transparent 70%);
      border-radius: 50%;
      animation: spinGlobe 60s linear infinite;
    }

    @keyframes spinGlobe {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hero-logo {
      position: relative;
      z-index: 2;
      width: min(470px, 88vw);
    }

    .live-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 18px 5%;
      background: #5d1c00;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .live-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--orange);
    }

    .live-strip strong {
      color: var(--orange);
      letter-spacing: 1px;
    }

    .section {
      padding: 80px 6%;
      background: #000000;
      position: relative;
      z-index: 10;
    }

    .section-heading {
      max-width: 820px;
      margin: 0 auto 42px;
      text-align: center;
    }

    .section-heading small {
      display: block;
      margin-bottom: 10px;
      color: var(--orange);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section-heading h2 {
      color: var(--orange-light);
      font-size: clamp(2rem, 4vw, 3.4rem);
      text-transform: uppercase;
    }

    .section-heading p {
      margin-top: 14px;
      color: #db7f37;
      line-height: 1.7;
    }

    /* MODIL YO - KORIGE POU YO PARET */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      position: relative;
      z-index: 20;
    }

    .service-card {
      position: relative;
      min-height: 225px;
      padding: 26px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #111111;
    }

    .service-card:hover {
      border-color: var(--orange);
    }

    .service-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 55px;
      height: 55px;
      margin-bottom: 20px;
      border-radius: 15px;
      color: #000000;
      background: var(--orange);
      font-size: 1.7rem;
      font-weight: 900;
    }

    .service-card h3 {
      margin-bottom: 12px;
      color: var(--orange);
      font-size: 1.17rem;
      text-transform: uppercase;
    }

    .service-card p {
      color: #d87731;
      font-size: 0.91rem;
      line-height: 1.65;
    }

    .service-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--orange-light);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .platform-section {
      background: #050505;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .platform-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 40px;
      align-items: center;
    }

    .platform-image {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 25px;
      background: #000000;
    }

    .platform-image img {
      width: 100%;
      max-height: 500px;
      object-fit: contain;
    }

    .platform-content h2 {
      color: var(--orange);
      font-size: clamp(2rem, 4vw, 3.5rem);
      text-transform: uppercase;
    }

    .platform-content p {
      margin-top: 18px;
      color: #dd8138;
      line-height: 1.8;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
    }

    .feature-item {
      padding: 15px;
      border-left: 4px solid var(--orange);
      border-radius: 9px;
      color: var(--orange-light);
      background: #0d0d0d;
      font-weight: 800;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 15px;
      margin-top: 42px;
    }

    .stat-card {
      padding: 25px 15px;
      border: 1px solid var(--border);
      border-radius: 15px;
      text-align: center;
      background: #090909;
    }

    .stat-card strong {
      display: block;
      color: var(--orange);
      font-size: 2rem;
    }

    .stat-card span {
      display: block;
      margin-top: 6px;
      color: #cf7432;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cta {
      margin: 30px 6% 75px;
      padding: 55px 7%;
      border: 1px solid var(--orange);
      border-radius: 28px;
      text-align: center;
      background: #000000;
    }

    .cta h2 {
      color: var(--orange);
      font-size: clamp(2rem, 4vw, 3.6rem);
      text-transform: uppercase;
    }

    .cta p {
      max-width: 700px;
      margin: 17px auto 25px;
      color: var(--orange-light);
      line-height: 1.7;
    }

    .site-footer {
      padding: 50px 6% 25px;
      border-top: 1px solid var(--border);
      background: #000000;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.3fr repeat(3, 1fr);
      gap: 35px;
    }

    .footer-brand img {
      width: 95px;
      margin-bottom: 17px;
    }

    .footer-brand h3 {
      color: var(--orange);
    }

    .footer-brand p {
      max-width: 350px;
      margin-top: 11px;
      color: #b95e24;
      line-height: 1.6;
    }

    .footer-column h4 {
      margin-bottom: 16px;
      color: var(--orange);
      text-transform: uppercase;
    }

    .footer-column a {
      display: block;
      margin-bottom: 10px;
      color: #ce7636;
      font-size: 0.91rem;
    }

    .footer-column a:hover {
      color: var(--orange-light);
    }

    .footer-bottom {
      margin-top: 35px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 106, 0, 0.22);
      color: #a44e1c;
      text-align
