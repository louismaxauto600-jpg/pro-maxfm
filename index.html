<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PRO-MAX FM/DMP | Digital Radio Platform</title>

  <meta
    name="description"
    content="PRO-MAX FM/DMP se yon platfòm radyo dijital, medya, mizik, nouvèl, podcast, akademi ak jesyon pwofesyonèl."
  >

  <style>
    :root {
      --orange: #ff6a00;
      --orange-light: #ff9d00;
      --orange-dark: #b83b00;
      --black: #000000;
      --black-soft: #090909;
      --black-card: #111111;
      --border: rgba(255, 106, 0, 0.42);
      --shadow: 0 0 30px rgba(255, 106, 0, 0.22);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--orange-light);
      background:
        radial-gradient(circle at top, rgba(255, 106, 0, 0.22), transparent 35%),
        linear-gradient(145deg, #000000 0%, #100500 48%, #000000 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .top-bar {
      background: linear-gradient(90deg, #000000, #8f2e00, #ff6a00, #000000);
      color: #000000;
      padding: 9px 20px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 5%;
      background: rgba(0, 0, 0, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(15px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 230px;
    }

    .brand-logo {
      width: 62px;
      height: 62px;
      object-fit: contain;
      border-radius: 50%;
      background: #000000;
      border: 2px solid var(--orange);
      box-shadow: 0 0 18px rgba(255, 106, 0, 0.6);
    }

    .brand-text strong {
      display: block;
      color: var(--orange);
      font-size: 1.15rem;
      letter-spacing: 1px;
    }

    .brand-text span {
      color: var(--orange-light);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .main-nav a {
      padding: 9px 11px;
      border-radius: 8px;
      color: var(--orange-light);
      font-size: 0.83rem;
      font-weight: 800;
      transition: 0.25s ease;
    }

    .main-nav a:hover {
      color: #000000;
      background: var(--orange);
      transform: translateY(-2px);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 43px;
      padding: 11px 17px;
      border: 1px solid var(--orange);
      border-radius: 10px;
      font-weight: 900;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .btn-primary {
      color: #000000;
      background: linear-gradient(135deg, var(--orange-light), var(--orange));
      box-shadow: 0 0 20px rgba(255, 106, 0, 0.35);
    }

    .btn-secondary {
      color: var(--orange);
      background: #000000;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 27px rgba(255, 106, 0, 0.55);
    }

    .menu-button {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid var(--orange);
      border-radius: 9px;
      color: var(--orange);
      background: #000000;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 84vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      align-items: center;
      gap: 50px;
      padding: 85px 7%;
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border: 1px solid var(--orange);
      border-radius: 30px;
      color: var(--orange);
      background: rgba(0, 0, 0, 0.72);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 800px;
      color: var(--orange);
      font-size: clamp(2.7rem, 6vw, 6rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(255, 106, 0, 0.42);
    }

    .hero h1 span {
      display: block;
      color: var(--orange-light);
      font-size: 0.45em;
      margin-top: 17px;
      line-height: 1.15;
    }

    .hero p {
      max-width: 720px;
      margin-top: 25px;
      color: #ffb15a;
      font-size: 1.07rem;
      line-height: 1.8;
    }

    .hero-buttons {
      display: flex;
      gap: 13px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .hero-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GLOBE TERES REYEL - PA BLINK ANKO */
    .globe {
      position: absolute;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      background: url('https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57723/globe_east_540.jpg') center/cover;
      border: 2px solid rgba(255, 106, 0, 0.4);
      box-shadow: 
        inset -40px -20px 60px rgba(0, 0, 0, 0.9),
        inset 20px 10px 40px rgba(255, 106, 0, 0.2),
        0 0 80px rgba(255, 106, 0, 0.4);
      animation: spinGlobe 50s linear infinite;
      z-index: 1;
    }

    @keyframes spinGlobe {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hero-logo-wrap::before,
    .hero-logo-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 106, 0, 0.36);
      z-index: 0;
    }

    .hero-logo-wrap::before {
      width: 450px;
      height: 450px;
      animation: pulseRing 3s infinite;
    }

    .hero-logo-wrap::after {
      width: 520px;
      height: 520px;
      animation: pulseRing 3s 1.2s infinite;
    }

    .hero-logo {
      position: relative;
      z-index: 2;
      width: min(470px, 88vw);
      filter: drop-shadow(0 0 35px rgba(255, 106, 0, 0.65));
      animation: logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes pulseRing {
      0% { transform: scale(0.87); opacity: 0.65; }
      100% { transform: scale(1.17); opacity: 0; }
    }

    .live-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      padding: 18px 5%;
      background: linear-gradient(90deg, #000000, #5d1c00, #000000);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .live-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 12px var(--orange);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.25; }
    }

    .live-strip strong {
      color: var(--orange);
      letter-spacing: 1px;
    }

    .section {
      padding: 80px 6%;
    }

    .section-heading {
      max-width: 820px;
      margin: 0 auto 42px;
      text-align: center;
    }

    .section-heading small {
      display: block;
      margin-bottom: 10px;
      color: var(--orange);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section-heading h2 {
      color: var(--orange-light);
      font-size: clamp(2rem, 4vw, 3.4rem);
      text-transform: uppercase;
    }

    .section-heading p {
      margin-top: 14px;
      color: #db7f37;
      line-height: 1.7;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .service-card {
      position: relative;
      min-height: 225px;
      padding: 26px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background:
        linear-gradient(150deg, rgba(255, 106, 0, 0.11), transparent 47%),
        var(--black-card);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: 0.3s ease;
    }

    .service-card::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      right: -45px;
      bottom: -45px;
      border-radius: 50%;
      background: var(--orange);
      opacity: 0.13;
    }

    .service-card:hover {
      transform: translateY(-8px);
      border-color: var(--orange);
      box-shadow: 0 0 32px rgba(255, 106, 0, 0.35);
    }

    .service-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 55px;
      height: 55px;
      margin-bottom: 20px;
      border-radius: 15px;
      color: #000000;
      background: var(--orange);
      font-size: 1.7rem;
      font-weight: 900;
    }

    .service-card h3 {
      margin-bottom: 12px;
      color: var(--orange);
      font-size: 1.17rem;
      text-transform: uppercase;
    }

    .service-card p {
      color: #d87731;
      font-size: 0.91rem;
      line-height: 1.65;
    }

    .service-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--orange-light);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .platform-section {
      background:
        radial-gradient(circle at left, rgba(255, 106, 0, 0.12), transparent 32%),
        #050505;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .platform-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 40px;
      align-items: center;
    }

    .platform-image {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 25px;
      background: linear-gradient(140deg, #000000, #1c0800);
      box-shadow: var(--shadow);
    }

    .platform-image img {
      width: 100%;
      max-height: 500px;
      object-fit: contain;
      filter: drop-shadow(0 0 25px rgba(255, 106, 0, 0.4));
    }

    .platform-content h2 {
      color: var(--orange);
      font-size: clamp(2rem, 4vw, 3.5rem);
      text-transform: uppercase;
    }

    .platform-content p {
      margin-top: 18px;
      color: #dd8138;
      line-height: 1.8;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
    }

    .feature-item {
      padding: 15px;
      border-left: 4px solid var(--orange);
      border-radius: 9px;
      color: var(--orange-light);
      background: #0d0d0d;
      font-weight: 800;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 15px;
      margin-top: 42px;
    }

    .stat-card {
      padding: 25px 15px;
      border: 1px solid var(--border);
      border-radius: 15px;
      text-align: center;
      background: #090909;
    }

    .stat-card strong {
      display: block;
      color: var(--orange);
      font-size: 2rem;
    }

    .stat-card span {
      display: block;
      margin-top: 6px;
      color: #cf7432;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .cta {
      margin: 30px 6% 75px;
      padding: 55px 7%;
      border: 1px solid var(--orange);
      border-radius: 28px;
      text-align: center;
      background:
        linear-gradient(135deg, rgba(255, 106, 0, 0.28), rgba(0, 0, 0, 0.94)),
        #000000;
      box-shadow: 0 0 40px rgba(255, 106, 0, 0.25);
    }

    .cta h2 {
      color: var(--orange);
      font-size: clamp(2rem, 4vw, 3.6rem);
      text-transform: uppercase;
    }

    .cta p {
      max-width: 700px;
      margin: 17px auto 25px;
      color: var(--orange-light);
      line-height: 1.7;
    }

    .site-footer {
      padding: 50px 6% 25px;
      border-top: 1px solid var(--border);
      background: #000000;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.3fr repeat(3, 1fr);
      gap: 35px;
    }

    .footer-brand img {
      width: 95px;
      margin-bottom: 17px;
    }

    .footer-brand h3 {
      color: var(--orange);
    }

      max-width: 350px;
