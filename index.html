<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PRO-MAX FM DMP — Powering the Future of Digital Radio">
  <meta name="theme-color" content="#050505">
  <title>PRO-MAX FM DMP | Digital Radio Platform</title>
  <style>
    :root {
      --orange: #ff7300;
      --orange-light: #ff9b22;
      --black: #000;
      --text: #ffd2a3;
      --muted: #c88952;
      --border: rgba(255, 115, 0, 0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh; overflow-x: hidden; color: var(--text);
      background: radial-gradient(circle at top center, rgba(255, 115, 0, 0.16), transparent 32%),
                  linear-gradient(135deg, #000000 0%, #0a0705 52%, #361100 100%);
      font-family: Arial, Helvetica, sans-serif; line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; }

    /* HEADER + LOGO + GWO GLOBE ANIME */
  .topbar {
      position: sticky; top: 0; z-index: 1000;
      width: 100%; background: rgba(0, 0, 0, 0.96);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(18px);
    }
  .topbar-inner {
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 16px; padding: 12px 20px;
      max-width: 1400px; margin: 0 auto;
    }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
      width: 56px; height: 56px; border-radius: 50%;
      border: 2px solid var(--orange); background: var(--orange);
      display: grid; place-items: center; font-weight: 900; color: #000;
      font-size: 1.3rem; box-shadow: 0 0 25px rgba(255,115,0,.5);
    }
  .brand-text h1 { font-size: 18px; text-transform: uppercase; line-height: 1; }
  .brand-text p { font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing:.8px; color: var(--muted); }

    /* GWO GLOBE ANIME APRE PRO-MAX FM DMP */
  .globe-container {
      width: 70px; height: 70px; position: relative; cursor: pointer;
      animation: spin 10s linear infinite; margin-left: 15px;
    }
  .globe-sphere {
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff9b22 0%, #ff7300 40%, #c44d00 100%);
      box-shadow: 0 0 30px rgba(255,115,0,.7), inset -10px -10px 30px rgba(0,0,0,.5);
      position: relative; overflow: hidden;
    }
  .globe-sphere::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 10px, rgba(0,0,0,.4) 10px, rgba(0,0,0,.4) 11px),
                  repeating-linear-gradient(90deg, transparent 0px, transparent 10px, rgba(0,0,0,.4) 10px, rgba(0,0,0,.4) 11px);
      border-radius: 50%;
    }
  .globe-sphere::after {
      content: "🌍"; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); font-size: 36px;
      animation: glow 3s ease-in-out infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes glow {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px #ff7300); }
      50% { opacity: 0.7; filter: drop-shadow(0 0 20px #ff7300); }
    }

  .main-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .nav-btn {
      padding: 8px 14px; border: 1px solid var(--orange);
      border-radius: 999px; font-weight: 700; font-size: 0.85rem;
      background: #000; color: var(--orange); transition:.25s;
    }
  .nav-btn:hover,.nav-btn.active { background: var(--orange); color: #000; }

    /* LANGUAGE TOGGLE */
  .lang-toggle {
      padding: 10px 18px; border: 2px solid var(--orange);
      border-radius: 999px; font-weight: 900; background: #000;
      color: var(--orange); transition:.25s; font-size: 0.9rem;
    }
  .lang-toggle:hover { background: var(--orange); color: #000; transform: scale(1.05); }
